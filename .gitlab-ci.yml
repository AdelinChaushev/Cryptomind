stages:
  - deploy

variables:
  COMPOSE_PROFILES: production

production:
  stage: deploy
  rules:
    - if: $DEPLOY == "prod"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
  script:
    - docker compose pull
    - docker compose build
    - docker compose up -d
    - docker image prune -f
  tags:
    - production-docker